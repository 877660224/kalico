# ALPS USB 串口压力传感器配置示例
#
# 这是通过 USB 串口通信的 ALPS 压力传感器的示例配置。
#
# 传感器输出格式为：a=**,b=**
# 其中 'a' 是原始数据，'b' 是卡尔曼滤波后的数据。
# 本实现使用 'b' 值（滤波后的数据）。
#
# 采样率固定为 2600 Hz，无法更改。

[load_cell alps_pressure]
sensor_type: alps_serial

# 串口配置
# Linux: /dev/ttyUSB0, /dev/ttyACM0 等
# Windows: COM3, COM4 等
# macOS: /dev/cu.usbserial-*, /dev/cu.usbmodem-*
serial_port: /dev/ttyUSB0

# 波特率（默认 9600，根据传感器规格调整）
baudrate: 9600

# 串口超时时间（秒）
timeout: 1.0

# 校准参数（校准后必须设置）
# 使用 LOAD_CELL_CALIBRATE 命令进行校准
# counts_per_gram: 1.0
# reference_tare_counts: 0

# 传感器方向（normal 或 inverted）
# sensor_orientation: normal
