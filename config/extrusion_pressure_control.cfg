# Extrusion Pressure Control Configuration Example
# 
# This file provides example configuration for the extrusion pressure control system.
# Copy the relevant sections to your printer.cfg and modify as needed.
#
# Required hardware:
# - Load cell sensor (ADS1220 or HX711 recommended)
# - Proper mechanical installation to measure extrusion pressure

######################################################################
# Load Cell Sensor Configuration
######################################################################

# Option 1: ADS1220 ADC (Recommended for high precision)
[ads1220 my_load_cell]
cs_pin: PA4
data_ready_pin: PA3
# SPI bus configuration
#spi_bus: spi1
#spi_speed: 512000

# Option 2: HX711 ADC (Lower cost alternative)
# [hx71x my_load_cell]
# dout_pin: PA3
# sclk_pin: PA4
# gain: 128

# Load Cell Configuration
[load_cell]
sensor_type: ads1220
# For HX711, use: sensor_type: hx71x
scale: 1.0
offset: 0.0

######################################################################
# Extrusion Pressure Control Configuration
######################################################################

[extrusion_pressure_control]
# === Nozzle Parameters ===
nozzle_diameter: 0.4              # Your nozzle diameter (mm)
nozzle_length: 2.0                # Nozzle length (mm)

# === Material Configuration ===
# Supported materials: PLA, PETG, ABS, TPU, NYLON
material_type: PLA

# === Pressure Model Parameters ===
# These values can be adjusted after calibration
pressure_coefficient: 1.0         # Overall pressure scaling factor
base_pressure: 5.0                # Minimum pressure value
max_pressure: 50.0                # Maximum pressure value

# Polynomial coefficients for pressure model: P = a0 + a1*v + a2*v²
# These are used when calibration data is not available
poly_coef_a0: 2.0
poly_coef_a1: 0.5
poly_coef_a2: 0.01

# === Lookahead Configuration ===
lookahead_depth: 30               # Number of moves to look ahead (5-100)
velocity_change_threshold: 5.0    # Speed change threshold to trigger adjustment (mm/s)

# === PID Controller Parameters ===
# Tune these based on your system response
pid_kp: 0.5                       # Proportional gain
pid_ki: 0.1                       # Integral gain
pid_kd: 0.02                      # Derivative gain

# === Control Parameters ===
target_pressure: 10.0             # Default target pressure
pressure_tolerance: 0.5           # Acceptable pressure deviation
adjustment_method: extrude_factor # Method: extrude_factor or rotation_distance
control_mode: closed_loop         # Mode: open_loop, closed_loop, or hybrid
control_period: 0.01              # Control loop period (seconds)
min_adjustment_interval: 0.05     # Minimum time between adjustments (seconds)

# === Feedforward Control ===
use_feedforward: True             # Enable predictive pressure adjustment
feedforward_gain: 0.1             # Feedforward gain factor

# === Feedback Validation ===
history_size: 100                 # Number of samples for statistics
warning_threshold: 2.0            # Pressure deviation warning threshold
critical_threshold: 5.0           # Pressure deviation critical threshold
learning_rate: 0.01               # Adaptive learning rate
trend_window: 10                  # Number of samples for trend analysis
trend_threshold: 0.5              # Trend detection threshold

# === Calibration Parameters ===
# Speeds to test during automatic calibration (comma-separated)
calibration_speeds: 10,20,30,40,50,60
calibration_duration: 5.0         # Duration for each calibration speed (seconds)
calibration_distance: 50.0        # Distance to move during calibration (mm)

######################################################################
# Alternative Configuration for Different Materials
######################################################################

# For PETG:
# [extrusion_pressure_control]
# material_type: PETG
# pressure_coefficient: 1.2
# target_pressure: 12.0

# For TPU (flexible material):
# [extrusion_pressure_control]
# material_type: TPU
# pressure_coefficient: 1.5
# target_pressure: 15.0
# pid_kp: 0.3
# pid_ki: 0.08

# For ABS:
# [extrusion_pressure_control]
# material_type: ABS
# pressure_coefficient: 1.3
# target_pressure: 11.0

######################################################################
# Example Macro for Print Start
######################################################################

# [gcode_macro PRINT_START]
# gcode:
#     ; Home and heat
#     G28
#     M140 S{params.BED_TEMP|default(60)}
#     M104 S{params.EXTRUDER_TEMP|default(210)}
#     M190 S{params.BED_TEMP|default(60)}
#     M109 S{params.EXTRUDER_TEMP|default(210)}
#     
#     ; Tare load cell
#     LOAD_CELL_TARE
#     
#     ; Enable pressure control
#     PRESSURE_CONTROL_ENABLE
#     SET_TARGET_PRESSURE PRESSURE={params.PRESSURE|default(10.0)}
#     SET_PRESSURE_MATERIAL MATERIAL={params.MATERIAL|default("PLA")}

######################################################################
# Example Macro for Print End
######################################################################

# [gcode_macro PRINT_END]
# gcode:
#     ; Disable pressure control
#     PRESSURE_CONTROL_DISABLE
#     
#     ; Print status
#     PRESSURE_CONTROL_STATUS
#     
#     ; Standard end gcode
#     M104 S0
#     M140 S0
#     G28 X Y
#     M84

######################################################################
# Example Macro for Layer-based Pressure Adjustment
######################################################################

# [gcode_macro ADJUST_PRESSURE_FOR_LAYER]
# gcode:
#     {% set layer = params.LAYER|default(1)|int %}
#     {% if layer == 1 %}
#         ; First layer - higher pressure for adhesion
#         SET_TARGET_PRESSURE PRESSURE=12.0
